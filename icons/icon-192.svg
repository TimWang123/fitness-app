<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FF1744"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  <!-- Dumbbell -->
  <g fill="white" stroke="white" stroke-width="4" stroke-linecap="round">
    <!-- Bar -->
    <line x1="48" y1="96" x2="144" y2="96" stroke-width="5"/>
    <!-- Left plates -->
    <rect x="33" y="68" width="15" height="56" rx="3"/>
    <rect x="20" y="75" width="13" height="42" rx="3"/>
    <!-- Right plates -->
    <rect x="144" y="68" width="15" height="56" rx="3"/>
    <rect x="159" y="75" width="13" height="42" rx="3"/>
  </g>
  <!-- Timer -->
  <circle cx="134" cy="58" r="28" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2.5"/>
  <line x1="134" y1="58" x2="134" y2="38" stroke="white" stroke-width="2.5"/>
  <line x1="134" y1="58" x2="150" y2="62" stroke="white" stroke-width="2"/>
  <!-- Tick mark -->
  <line x1="134" y1="30" x2="134" y2="33" stroke="white" stroke-width="2"/>
</svg>